# Ideal molecular swap: phosphate charge states via pKa titration.
# No interactions, so Henderson-Hasselbalch is exact.
#
# Species: Hв‚ѓPOв‚„ (0), Hв‚‚POв‚„вЃ» (-1), HPOв‚„ВІвЃ» (-2), POв‚„ВівЃ» (-3)
# pKa values: 2.15, 7.20, 12.35
# At pH = 7.20 (activity HвЃє = 10^-7.20):
#   Hв‚ѓPOв‚„  в‡Њ Hв‚‚POв‚„вЃ»  + HвЃє   pKa = 2.15
#   Hв‚‚POв‚„вЃ» в‡Њ HPOв‚„ВІвЃ»   + HвЃє   pKa = 7.20
#   HPOв‚„ВІвЃ»  в‡Њ POв‚„ВівЃ»    + HвЃє   pKa = 12.35
#
# At pH = 7.20:
#   Kв‚Ѓ_eff = 10^(pH-pKaв‚Ѓ) = 10^5.05  в‰€ 1.12e5  в†’ Hв‚ѓPOв‚„  negligible
#   Kв‚‚_eff = 10^(pH-pKaв‚‚) = 10^0.00  = 1.0      в†’ Hв‚‚POв‚„вЃ» в‰€ HPOв‚„ВІвЃ»
#   Kв‚ѓ_eff = 10^(pH-pKaв‚ѓ) = 10^-5.15 в‰€ 7.08e-6  в†’ POв‚„ВівЃ»  negligible
#
# Expected: count(molecule HPOв‚„ВІвЃ») в‰€ count(molecule Hв‚‚POв‚„вЃ») в‰€ N/2 = 10

atoms:
  - {name: P, mass: 31.0, sigma: 3.0, charge: 0.0}
  - {name: O, mass: 16.0, sigma: 2.8, charge: 0.0}
  - {name: H+, mass: 1.0, activity: 6.30957e-8}  # 10^(-7.20)

molecules:
  - name: Hв‚ѓPOв‚„
    atoms: [P, O, O, O, O]
  - name: Hв‚‚POв‚„вЃ»
    atoms: [P, O, O, O, O]
  - name: HPOв‚„ВІвЃ»
    atoms: [P, O, O, O, O]
  - name: POв‚„ВівЃ»
    atoms: [P, O, O, O, O]

system:
  cell: !Cuboid [20.0, 20.0, 20.0]
  medium:
    permittivity: !Vacuum
    temperature: 298.15
  energy: {}
  blocks:
    - molecule: Hв‚ѓPOв‚„
      N: 20
      active: 0
      insert: !RandomAtomPos {}
    - molecule: Hв‚‚POв‚„вЃ»
      N: 20
      active: 20
      insert: !RandomAtomPos {}
    - molecule: HPOв‚„ВІвЃ»
      N: 20
      active: 0
      insert: !RandomAtomPos {}
    - molecule: POв‚„ВівЃ»
      N: 20
      active: 0
      insert: !RandomAtomPos {}

analysis:
  - !CollectiveVariable
    property: count
    selection: "molecule 'Hв‚‚POв‚„вЃ»'"
    frequency: !Every 1
  - !CollectiveVariable
    property: count
    selection: "molecule 'HPOв‚„ВІвЃ»'"
    frequency: !Every 1

propagate:
  seed: !Fixed 42
  criterion: Metropolis
  repeat: 5000
  collections:
    - !Deterministic
      moves:
        - !SpeciationMove
          temperature: 298.15
          reactions:
            - ["Hв‚ѓPOв‚„ = Hв‚‚POв‚„вЃ» + ~H+", !pK 2.15]
            - ["Hв‚‚POв‚„вЃ» = HPOв‚„ВІвЃ» + ~H+", !pK 7.20]
            - ["HPOв‚„ВІвЃ» = POв‚„ВівЃ» + ~H+", !pK 12.35]
