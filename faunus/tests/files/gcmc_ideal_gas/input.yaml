# Ideal gas GCMC: non-interacting particles with speciation move.
# Acceptance follows Smith & Triska (1994) with (V·c₀)^Δν · ∏[N!/(N+ν)!] factors
# where c₀ = N_A·10⁻²⁷ is the 1 M standard state in 1/ų.
#
# Reaction "= particle" inserts/deletes single-atom molecules.
#
# Expected analysis:
#   count("molecule particle") = K·V·c₀ = 16.6054 * 1000 * 6.022e-4 = 10

atoms:
  - {name: X, mass: 1.0, sigma: 1.0}

molecules:
  - name: particle
    atoms: [X]

system:
  cell: !Cuboid [10.0, 10.0, 10.0]
  medium:
    permittivity: !Vacuum
    temperature: 298.15
  energy: {}
  blocks:
    - molecule: particle
      N: 30
      active: 10
      insert: !RandomAtomPos {}

analysis:
  - !CollectiveVariable
    property: count
    selection: "molecule particle"
    frequency: !Every 1

propagate:
  seed: !Fixed 42
  criterion: Metropolis
  repeat: 5000
  collections:
    - !Deterministic
      moves:
        - !SpeciationMove
          temperature: 298.15
          reactions:
            - ["= particle", !K 16.6053906717]
