atoms:
  - name: OW
    mass: 15.999
    charge: -0.8476
    sigma: 3.166
    epsilon: 0.650
  - name: HW
    mass: 1.007
    charge: 0.4238
    sigma: 2.0
    epsilon: 0.0

molecules:
  - name: water
    from_structure: "water.xyz"
    exclusions: [[0, 1], [0, 2], [1, 2]]
    has_com: true

system:
  cell: !Cuboid [18.6, 18.6, 18.6]
  medium:
    temperature: 300
    permittivity: !Vacuum

  blocks:
    - molecule: water
      N: 128
      insert:
        !RandomCOM { rotate: true }

  energy:
    nonbonded:
      default:
        - !LennardJones {mixing: LB}
    combine_with_default: true
    spline:
      cutoff: 14.0
      shift_energy: false
    ewald:
      cutoff: 9.0
      accuracy: 1e-5
    pressure: !atm 1

analysis:
  - !CollectiveVariable {property: volume, frequency: !Every 10}
  - !Energy {file: energy.dat, frequency: !Every 10}

propagate:
  seed: !Fixed 42
  criterion: Metropolis
  repeat: 1000
  collections:
    - !Deterministic
      moves:
        - !TranslateMolecule {molecule: water, dp: 0.4, repeat: 64}
        - !RotateMolecule {molecule: water, dp: 0.4, repeat: 64}
        - !VolumeMove {dV: 0.03, repeat: 5}
