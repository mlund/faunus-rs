# Phosphate titration in a spherical cell.
#
# One phosphate molecule undergoes 3-step protonation via molecular swap:
#   Hв‚ѓPOв‚„(0) в‡Њ Hв‚‚POв‚„вЃ»(-1) в‡Њ HPOв‚„ВІвЃ»(-2) в‡Њ POв‚„ВівЃ»(-3)
#
# The sphere radius gives ~10 mM phosphate concentration.
# Charges are smeared on oxygens; all four species share the same geometry.

atoms:
  - {name: P,  mass: 31.0, Пѓ: 3.5, Оµ: 0.8368, charge: 0.0,   hydrophobicity: !Lambda 0.0}
  - {name: O0, mass: 16.0, Пѓ: 2.8, Оµ: 0.8368, charge: 0.0,   hydrophobicity: !Lambda 0.0}  # Hв‚ѓPOв‚„
  - {name: O1, mass: 16.0, Пѓ: 2.8, Оµ: 0.8368, charge: -0.25, hydrophobicity: !Lambda 0.0}  # Hв‚‚POв‚„вЃ»
  - {name: O2, mass: 16.0, Пѓ: 2.8, Оµ: 0.8368, charge: -0.5,  hydrophobicity: !Lambda 0.0}  # HPOв‚„ВІвЃ»
  - {name: O3, mass: 16.0, Пѓ: 2.8, Оµ: 0.8368, charge: -0.75, hydrophobicity: !Lambda 0.0}  # POв‚„ВівЃ»
  - {name: H+, mass: 1.0,  Пѓ: 1.0, Оµ: 0.8368, hydrophobicity: !Lambda 0.0, activity: 1.0e-7}  # pH 7

molecules:
  - name: Hв‚ѓPOв‚„
    from_structure: "phosphate.xyz"
    atoms: [P, O0, O0, O0, O0]
    exclusions: [[0,1],[0,2],[0,3],[0,4],[1,2],[1,3],[1,4],[2,3],[2,4],[3,4]]
  - name: Hв‚‚POв‚„вЃ»
    from_structure: "phosphate.xyz"
    atoms: [P, O1, O1, O1, O1]
    exclusions: [[0,1],[0,2],[0,3],[0,4],[1,2],[1,3],[1,4],[2,3],[2,4],[3,4]]
  - name: HPOв‚„ВІвЃ»
    from_structure: "phosphate.xyz"
    atoms: [P, O2, O2, O2, O2]
    exclusions: [[0,1],[0,2],[0,3],[0,4],[1,2],[1,3],[1,4],[2,3],[2,4],[3,4]]
  - name: POв‚„ВівЃ»
    from_structure: "phosphate.xyz"
    atoms: [P, O3, O3, O3, O3]
    exclusions: [[0,1],[0,2],[0,3],[0,4],[1,2],[1,3],[1,4],[2,3],[2,4],[3,4]]

system:
  cell: !Sphere {radius: 26.8}  # V в‰€ 80,600 Г…Ві в†’ ~10 mM for one molecule

  medium:
    permittivity: !Water
    temperature: 298.15

  blocks:
    # One active phosphate (Hв‚‚POв‚„вЃ»); N=1 per species for full titration range
    - molecule: Hв‚ѓPOв‚„
      N: 1
      active: 0
      insert: !FixedCOM {position: [0.0, 0.0, 0.0]}
    - molecule: Hв‚‚POв‚„вЃ»
      N: 1
      active: 1
      insert: !FixedCOM {position: [0.0, 0.0, 0.0]}
    - molecule: HPOв‚„ВІвЃ»
      N: 1
      active: 0
      insert: !FixedCOM {position: [0.0, 0.0, 0.0]}
    - molecule: POв‚„ВівЃ»
      N: 1
      active: 0
      insert: !FixedCOM {position: [0.0, 0.0, 0.0]}

  energy:
    combine_with_default: false  # no nonbonded вЂ” ideal titration

analysis:
  - !CollectiveVariable
    property: count
    selection: "molecule 'Hв‚ѓPOв‚„'"
    frequency: !Every 1
  - !CollectiveVariable
    property: count
    selection: "molecule 'Hв‚‚POв‚„вЃ»'"
    frequency: !Every 1
  - !CollectiveVariable
    property: count
    selection: "molecule 'HPOв‚„ВІвЃ»'"
    frequency: !Every 1
  - !CollectiveVariable
    property: count
    selection: "molecule 'POв‚„ВівЃ»'"
    frequency: !Every 1

propagate:
  seed: Hardware
  criterion: Metropolis
  repeat: 500
  collections:
    - !Stochastic
      repeat: 10
      moves:
        - !SpeciationMove
          temperature: 298.15
          reactions:
            - ["Hв‚ѓPOв‚„ = Hв‚‚POв‚„вЃ» + ~H+", !pK 2.15]
            - ["Hв‚‚POв‚„вЃ» = HPOв‚„ВІвЃ» + ~H+", !pK 7.20]
            - ["HPOв‚„ВІвЃ» = POв‚„ВівЃ» + ~H+", !pK 12.35]
