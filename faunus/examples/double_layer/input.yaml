{# Electric double layer (Guldbrand, Jönsson, Wennerström & Linse, J. Chem. Phys. 80,
   2221 (1984)): osmotic pressure between two uniformly charged planes. Uses Guldbrand's
   parameters — σ=0.2244 C/m², 80 elementary charges of counterions, T=298 K
   (ε_r·T=2.327×10⁴), 2a=21 Å, and the electrically-transparent midplane wall of their
   Fig. 1c. The mono/divalent composition is set THERMODYNAMICALLY by a 2 Na⁺ ⇌ Ca²⁺ swap of
   free energy `dG` (kJ/mol): high dG → 80 monovalent; low dG → 40 divalent (charge-conserving,
   so σ is unchanged); between → mixtures. Each species has a lower/upper group pinned to its
   side of the midplane, so the swap keeps each half neutral.
   Method: see docs/analysis.md (DoubleLayerPressure). For the divalent attraction set lz=12
   and a low dG. Parameters below are edited in place — faunus renders with no external context. #}
{%- set sigma        = sigma        | default(0.014006) %}   {# |σ| e/Å² (0.2244 C/m²) #}
{%- set total_charge = total_charge | default(80) %}         {# total counterion charge (multiple of 4) #}
{%- set lz           = lz           | default(21.0) %}       {# plate separation 2a (Å) #}
{%- set dG           = dG           | default(20.0) %}       {# 2Na⁺⇌Ca²⁺ free energy (kJ/mol); high → mono #}
{%- set eps_r        = eps_r        | default(78.05) %}      {# ε_r·T = 2.327e4 K at 298.15 K #}
{%- set sweeps       = sweeps       | default(20000) %}      {# MC sweeps per run (use two runs: equilibrate, then sample) #}
{%- set k        = (total_charge / 2) | int %}              {# Na⁺ per half (= Ca²⁺ slots ×2) #}
{%- set ca_slots = (total_charge / 4) | int %}              {# max Ca²⁺ per half #}
{%- set side     = (total_charge / (2.0 * sigma)) ** 0.5 %} {# square box from electroneutrality 2σ·area = total_charge #}
{%- set c_wall   = -4.0 * 1389.3545764438197 / eps_r * sigma %}   {# Eq. 9 wall-potential prefactor: -4·(Coulomb prefactor)·σ #}
{%- set dp       = (lz / 4.0) | round(2) %}

atoms:
  - { name: Na, charge: 1.0, sigma: 0.0, mass: 23.0 }
  - { name: Ca, charge: 2.0, sigma: 0.0, mass: 40.0 }
molecules:
  - { name: na_lo, atoms: [Na] }
  - { name: na_up, atoms: [Na] }
  - { name: ca_lo, atoms: [Ca] }
  - { name: ca_up, atoms: [Ca] }

system:
  cell: !Slit [{{ side }}, {{ side }}, {{ lz }}]
  medium: { permittivity: !Fixed {{ eps_r }}, temperature: 298.15 }
  energy:
    nonbonded:
      default:
        - !Coulomb { cutoff: {{ (side * 10.0) | round(3) }} }   # full minimum-image, no Ewald
    customexternal:
      # Smeared charged walls (finite charged-square sheet, Guldbrand Eq. 9).
      - selection: "all"
        constants: { c: {{ c_wall }}, b: {{ side / 2.0 }}, hg: {{ lz / 2.0 }} }
        function: >-
          c * q * (
          2*b*asinh(b/sqrt(b*b+(z+hg)*(z+hg)))
          - (z+hg)*atan(b*b/((z+hg)*sqrt(2*b*b+(z+hg)*(z+hg))))
          + 2*b*asinh(b/sqrt(b*b+(hg-z)*(hg-z)))
          - (hg-z)*atan(b*b/((hg-z)*sqrt(2*b*b+(hg-z)*(hg-z))))
          )
      # Transparent midplane wall: hold each half's groups on its side.
      - { selection: "molecule na_lo ca_lo", function: "1000000.0 if z > 0 else 0.0" }
      - { selection: "molecule na_up ca_up", function: "1000000.0 if z < 0 else 0.0" }

  blocks:
    - { molecule: na_lo, N: {{ k }},        active: {{ k }}, insert: !RandomAtomPos { directions: xy } }
    - { molecule: na_up, N: {{ k }},        active: {{ k }}, insert: !RandomAtomPos { directions: xy } }
    - { molecule: ca_lo, N: {{ ca_slots }}, active: 0,       insert: !RandomAtomPos { directions: xy } }
    - { molecule: ca_up, N: {{ ca_slots }}, active: 0,       insert: !RandomAtomPos { directions: xy } }

propagate:
  seed: !Fixed 42
  criterion: Metropolis
  repeat: {{ sweeps }}
  collections:
    - !Stochastic
      repeat: {{ total_charge }}      # trial moves per sweep
      moves:
        - !TranslateMolecule { molecule: na_lo, dp: {{ dp }}, weight: {{ k }} }
        - !TranslateMolecule { molecule: na_up, dp: {{ dp }}, weight: {{ k }} }
        - !TranslateMolecule { molecule: ca_lo, dp: {{ dp }}, weight: {{ ca_slots }} }
        - !TranslateMolecule { molecule: ca_up, dp: {{ dp }}, weight: {{ ca_slots }} }
        # 2 Na⁺ ⇌ Ca²⁺ per half (charge-conserving); dG sets the composition.
        - !SpeciationMove
          temperature: 298.15
          weight: {{ (total_charge / 10) | int }}
          reactions:
            - ["na_lo + na_lo = ca_lo", !dG {{ dG }}]
            - ["na_up + na_up = ca_up", !dG {{ dG }}]

analysis:
  - !DoubleLayerPressure { selection: "atomtype Na Ca", file: pressure.csv, frequency: !Every {{ total_charge }} }
  - !CollectiveVariable { property: molarity, selection: "atomtype Na", file: molarity_na.dat, frequency: !Every {{ total_charge }} }
  - !CollectiveVariable { property: molarity, selection: "atomtype Ca", file: molarity_ca.dat, frequency: !Every {{ total_charge }} }
  - !Energy { file: energy.dat, frequency: !Every {{ 100 * total_charge }} }
