{# Electric double layer (Guldbrand, Jönsson, Wennerström & Linse,
   J. Chem. Phys. 80, 2221 (1984)): osmotic pressure between two uniformly
   charged planes with explicit point-charge counterions. Set the composition
   with n_mono / n_di (pure monovalent, pure divalent, or a mixture) and sweep
   the plate separation with lz. Method: see docs/analysis.md (DoubleLayerPressure). #}
{%- set sigma  = sigma  | default(0.014006) %}   {# |σ| e/Å² (0.2244 C/m²) #}
{%- set n_mono = n_mono | default(180) %}        {# monovalent (+1) counterions #}
{%- set n_di   = n_di   | default(0) %}          {# divalent (+2) counterions #}
{%- set lz     = lz     | default(21.0) %}       {# plate separation D (Å) #}
{%- set eps_r  = eps_r  | default(78.05) %}      {# ε_r·T = 2.327e4 K at 298.15 K #}
{%- set sweeps = sweeps | default(20000) %}
{%- set seed   = seed   | default(42) %}
{%- set ntot   = n_mono + n_di %}
{%- set side   = ((n_mono + 2 * n_di) / (2.0 * sigma)) ** 0.5 %}
{%- set c_wall = -4.0 * 1389.3545764438197 / eps_r * sigma %}
{%- set dp     = (lz / 4.0) | round(2) %}
{%- set nm_lo = (n_mono / 2) | int %}{% set nd_lo = (n_di / 2) | int %}{% set nlo = nm_lo + nd_lo %}

# Guldbrand double layer: n_mono={{ n_mono }}, n_di={{ n_di }}, D={{ lz }} Å, σ={{ sigma }} e/Å², box={{ side | round(2) }}² Å.

atoms:
  - { name: Na, charge: 1.0, sigma: 0.0, mass: 23.0 }
  - { name: Ca, charge: 2.0, sigma: 0.0, mass: 40.0 }

molecules:
  - { name: mono, atoms: [Na], atomic: true }
  - { name: di,   atoms: [Ca], atomic: true }

system:
  cell: !Slit [{{ side }}, {{ side }}, {{ lz }}]
  medium:
    permittivity: !Fixed {{ eps_r }}
    temperature: 298.15

  energy:
    nonbonded:
      default:
        - !Coulomb { cutoff: {{ (side * 10.0) | round(3) }} }
    customexternal:
      # Smeared charged walls (finite charged-square sheet, Guldbrand Eq. 9).
      - selection: "all"
        constants: { c: {{ c_wall }}, b: {{ side / 2.0 }}, hg: {{ lz / 2.0 }} }
        function: >-
          c * q * (
          2*b*asinh(b/sqrt(b*b+(z+hg)*(z+hg)))
          - (z+hg)*atan(b*b/((z+hg)*sqrt(2*b*b+(z+hg)*(z+hg))))
          + 2*b*asinh(b/sqrt(b*b+(hg-z)*(hg-z)))
          - (hg-z)*atan(b*b/((hg-z)*sqrt(2*b*b+(hg-z)*(hg-z))))
          )
      # Transparent midplane hard wall: hold each index-half on its side.
      - { selection: "index 0:{{ nlo - 1 }}",         function: "1000000.0 if z > 0 else 0.0" }
      - { selection: "index {{ nlo }}:{{ ntot - 1 }}", function: "1000000.0 if z < 0 else 0.0" }

  blocks:
    # Lower half first (indices 0..{{ nlo - 1 }}), then upper, so the two index
    # ranges are contiguous; RandomAtomPos (xy) starts ions at z=0 to be sorted.
{%- if nm_lo > 0 %}
    - { molecule: mono, N: {{ nm_lo }}, insert: !RandomAtomPos { directions: xy } }
{%- endif %}
{%- if nd_lo > 0 %}
    - { molecule: di,   N: {{ nd_lo }}, insert: !RandomAtomPos { directions: xy } }
{%- endif %}
{%- if n_mono - nm_lo > 0 %}
    - { molecule: mono, N: {{ n_mono - nm_lo }}, insert: !RandomAtomPos { directions: xy } }
{%- endif %}
{%- if n_di - nd_lo > 0 %}
    - { molecule: di,   N: {{ n_di - nd_lo }}, insert: !RandomAtomPos { directions: xy } }
{%- endif %}

propagate:
  seed: !Fixed {{ seed }}
  criterion: Metropolis
  repeat: {{ sweeps }}
  collections:
    - !Stochastic
      repeat: {{ ntot }}
      moves:
{%- if n_mono > 0 %}
        - !TranslateAtom { molecule: mono, dp: {{ dp }}, weight: {{ n_mono }} }
{%- endif %}
{%- if n_di > 0 %}
        - !TranslateAtom { molecule: di,   dp: {{ dp }}, weight: {{ n_di }} }
{%- endif %}

analysis:
  - !DoubleLayerPressure { selection: "atomtype Na Ca", file: pressure.csv, frequency: !Every {{ ntot }} }
  - !Energy { file: energy.dat, frequency: !Every {{ 100 * ntot }} }
