# Places two rigid molecules on a spherical cell and tracks
# the mass center separation during a MC simulation run. This
# can be used to calculate the potential of mean force.
#
# - The first molecule is placed at the center of a sphere and
#   can rotate only.
# - The second molecule is offset along the z-axis. It can
#   translate along z only, and freely rotate.
# - The `medium` information is used to set a Debye screening length
#   for the `Coulomb` potential under `nonbonded`.
# - The simulation cell is a sphere with hard boundaries from which no
#   particles can escape.

include: [calvados3.yaml]
molecules:
  - name: MOL1
    degrees_of_freedom: Rigid
    has_com: true
    from_structure: "4lzt.xyz"
  - name: MOL2
    degrees_of_freedom: Rigid
    has_com: true
    from_structure: "4lzt.xyz"

system:
  cell: !Cylinder {radius: 50.0, height: 200.0}
  medium:
    permittivity: !Water
    temperature: 298.15
    salt: [!NaCl, 0.05]

  blocks:
    - molecule: MOL1
      N: 1
      insert:
        # Place in the middle of the box
        !RandomCOM {
          rotate: true,
          directions: none,
          offset: [0.0, 0.0, 0.0],
        }
    - molecule: MOL2
      N: 1
      insert:
        # Place along z-axis
        !RandomCOM {
          rotate: true,
          directions: none,
          offset: [0.0, 0.0, 50.0],
        }

  energy:
    nonbonded:
      default:
        - !Coulomb {cutoff: 1000}

analysis:
  - !Energy
    file: "energy.csv.gz"
    frequency: !Every 100
  - !Trajectory
    file: "traj.xyz"
    frequency: !Every 100
  - !RadialDistribution
    selections: ["molecule MOL1", "molecule MOL2"]
    file: rdf.csv
    dr: 0.5
    use_com: true
    dimension: z
    frequency: !Every 10


wang_landau:
  coordinate:
    property: mass_center_separation
    selection: "molecule MOL1"
    selection2: "molecule MOL2"
    projection: z
    range: [26.0, 50.0]
    resolution: 0.5
  flatness_threshold: 0.8
  min_flatness: 10
  min_ln_f: 0.01
  steps_per_check: 100

umbrella:
  cv:
    property: mass_center_separation
    selection: "molecule MOL1"
    selection2: "molecule MOL2"
    projection: z
  windows:
    range: [24.0, 50.0]
    width: 8.0
    spacing: 4.0
    bin_width: 0.5
  drive:
    force_constant: 0.5

propagate:
  seed: Hardware
  criterion: Metropolis
  repeat: 200000
  collections:
    - !Stochastic
      moves:
        - !RotateMolecule {
            molecule: MOL1,
            dp: 1.0,
            weight: 0.5,
          }
        - !RotateMolecule {
            molecule: MOL2,
            dp: 1.0,
            weight: 1.0,
          }
        - !TranslateMolecule {
            molecule: MOL2,
            dp: 15.0,
            weight: 1.0,
            directions: !z,
          }
